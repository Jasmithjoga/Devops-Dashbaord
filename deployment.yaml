apiVersion: apps/v1
kind: Deployment

metadata:
  name: devops-dashboard

spec:
  replicas: 2

  selector:
    matchLabels:
      app: dashboard

  template:
    metadata:
      labels:
        app: dashboard

    spec:
      containers:
      - name: dashboard
        image: jasmithjoga/devops-dashboard
        ports:
        - containerPort: 80